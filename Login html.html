<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #91af79;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: black;
        }
        .login-container {
            background-image:url('tree branch2.jpg'); /* Here put the path of the image that'll be sent @dhruv or @shibya */
            background-size: cover;
            background-position: center;
            background-color: rgba(127, 86, 86, 0.1); 
            padding: 50px;
            border-radius: 5px;
            box-shadow: 1px 2px 3px 4px rgba(204, 199, 199, 0.267);
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 3px;
        }
        input[type="submit"] {
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 3px;
            padding: 10px 20px;
            cursor: pointer;
            
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>Login</h2>
        <form>
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" placeholder="Enter your username" required>
            <br>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" required>
            <br>
            <input type="submit" value="Login">
        </form>
    </div>
</body>
</html>
